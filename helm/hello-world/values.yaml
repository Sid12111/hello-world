replicaCount: 2

image:
  repository: ghcr.io/sid12111/hello-world
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

serviceAccount:
  create: true
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: "/metrics"
  prometheus.io/port: "8080"

# Set to true if the kube-prometheus-stack Prometheus Operator CRDs are installed
# in the cluster (this is the case if you provisioned monitoring via this repo's
# terraform/main.tf, which installs kube-prometheus-stack).
serviceMonitor:
  enabled: true
  namespace: monitoring
  interval: 15s

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5

nodeSelector: {}
tolerations: []
affinity: {}

# Public ALB Ingress. Override host/certificateArn at deploy time, e.g.:
#   helm upgrade --install hello-world ./helm/hello-world \
#     --set ingress.host=hello.example.com \
#     --set ingress.certificateArn=arn:aws:acm:...
# Without a host/cert it's still internet-facing, reachable at the ALB's
# own DNS name (find it with `kubectl -n hello-world get ingress`).
ingress:
  enabled: true
  className: alb
  host: ""
  certificateArn: ""
  annotations: {}
